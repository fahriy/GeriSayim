<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Countdown Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e0d;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.3);
            --accent-glow: rgba(0, 255, 136, 0.1);
            --danger: #ff4444;
            --warning: #ffaa00;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border: rgba(0, 255, 136, 0.15);
            --glass: rgba(0, 0, 0, 0.6);
            --card-bg: rgba(10, 15, 13, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 136, 0.02) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            animation: float 6s infinite;
            opacity: 0;
            filter: blur(1px);
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }
        
        .main-container {
            width: 95%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 50px var(--accent-glow);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .mission-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s ease;
        }
        
        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }
        
        .status-dot.complete {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .timer-section {
            margin: 30px 0;
        }
        
        .main-timer {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .time-unit {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .time-unit:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .time-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
            line-height: 1.2;
            margin-bottom: 6px;
        }
        
        .time-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .center-display {
            text-align: center;
            margin: 25px 0;
        }
        
        .big-seconds {
            font-family: 'Orbitron', sans-serif;
            font-size: 100px;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow), 0 0 60px var(--accent-glow), 0 0 90px var(--accent-dim);
            margin: 15px 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .big-seconds.complete {
            color: var(--danger);
            text-shadow: 0 0 30px rgba(255,68,68,0.3), 0 0 60px rgba(255,68,68,0.3);
            animation: none;
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-glow); }
            100% { text-shadow: 0 0 40px var(--accent-dim), 0 0 80px var(--accent-dim); }
        }
        
        .target-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        .target-info span {
            color: var(--accent);
        }
        
        .progress-section {
            margin: 25px 0;
        }
        
        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-dim);
            width: 0%;
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        /* BUTONLAR - HEPSİ EŞİT */
        .controls {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 25px 0;
        }
        
        .btn, .date-input {
            width: 100%;
            height: 48px;
            padding: 0 15px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .date-input {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .date-input:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(70%) sepia(100%) saturate(500%) hue-rotate(90deg);
            cursor: pointer;
        }
        
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .btn:active, .date-input:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-warning {
            border-color: var(--warning);
            color: var(--warning);
        }
        
        .btn-warning:hover {
            background: rgba(255, 170, 0, 0.15);
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.3);
            color: var(--warning);
            border-color: var(--warning);
        }
        
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.3);
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .preset-btn {
            padding: 8px 15px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .mission-id {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-secondary);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            z-index: 1000;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
            backdrop-filter: blur(10px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        @media (max-width: 900px) {
            .controls {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .main-container {
                padding: 20px;
            }
            
            .main-timer {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            
            .time-value {
                font-size: 24px;
            }
            
            .big-seconds {
                font-size: 70px;
            }
            
            .controls {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .presets {
                gap: 6px;
            }
            
            .preset-btn {
                font-size: 10px;
                padding: 6px 12px;
            }
        }
        
        @media (max-width: 480px) {
            .main-timer {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .time-value {
                font-size: 20px;
            }
            
            .big-seconds {
                font-size: 50px;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .btn, .date-input {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    
    <div class="main-wrapper">
        <div class="main-container">
            <div class="header">
                <div class="mission-title">◆ Operasyon Geri Sayım ◆</div>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <div class="status-text" id="statusText">HAZIR</div>
                </div>
            </div>
            
            <div class="timer-section">
                <div class="main-timer">
                    <div class="time-unit"><div class="time-value" id="yil">0</div><div class="time-label">Yıl</div></div>
                    <div class="time-unit"><div class="time-value" id="ay">0</div><div class="time-label">Ay</div></div>
                    <div class="time-unit"><div class="time-value" id="gun">0</div><div class="time-label">Gün</div></div>
                    <div class="time-unit"><div class="time-value" id="saat">0</div><div class="time-label">Saat</div></div>
                    <div class="time-unit"><div class="time-value" id="dk">0</div><div class="time-label">Dakika</div></div>
                    <div class="time-unit"><div class="time-value" id="sn">00</div><div class="time-label">Saniye</div></div>
                    <div class="time-unit"><div class="time-value" id="ms">000</div><div class="time-label">Milisaniye</div></div>
                </div>
                
                <div class="center-display">
                    <div class="big-seconds" id="bigSeconds">00</div>
                    <div class="target-info">HEDEF: <span id="targetText">-</span></div>
                </div>
                
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="progress-labels">
                        <span id="progressStart">BAŞLANGIÇ</span>
                        <span id="progressPercent">%0</span>
                        <span>HEDEF</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <input type="datetime-local" id="dateInput" class="date-input">
                <button class="btn btn-primary" onclick="start()">▶ BAŞLAT</button>
                <button class="btn" onclick="stop()">⏸ DURDUR</button>
                <button class="btn" onclick="resume()">⏵ DEVAM</button>
                <button class="btn btn-warning" onclick="addTime(1)">+1 DAKİKA</button>
                <button class="btn btn-danger" onclick="reset()">⏹ SIFIRLA</button>
            </div>
            
            <div class="presets">
                <button class="preset-btn" onclick="setPreset(1)">1 Dakika</button>
                <button class="preset-btn" onclick="setPreset(5)">5 Dakika</button>
                <button class="preset-btn" onclick="setPreset(15)">15 Dakika</button>
                <button class="preset-btn" onclick="setPreset(30)">30 Dakika</button>
                <button class="preset-btn" onclick="setPreset(60)">1 Saat</button>
                <button class="preset-btn" onclick="setPreset(1440)">24 Saat</button>
                <button class="preset-btn" onclick="setPreset(10080)">7 Gün</button>
            </div>
            
            <div class="footer">
                <div class="mission-id">MİSYON ID: #<span id="missionId">----</span></div>
            </div>
        </div>
    </div>
    
    <script>
        let targetTime = null;
        let running = false;
        let remaining = null;
        let animFrame = null;
        
        const el = {
            yil: document.getElementById("yil"),
            ay: document.getElementById("ay"),
            gun: document.getElementById("gun"),
            saat: document.getElementById("saat"),
            dk: document.getElementById("dk"),
            sn: document.getElementById("sn"),
            ms: document.getElementById("ms"),
            big: document.getElementById("bigSeconds"),
            target: document.getElementById("targetText"),
            statusDot: document.getElementById("statusDot"),
            statusText: document.getElementById("statusText"),
            progressFill: document.getElementById("progressFill"),
            progressPercent: document.getElementById("progressPercent"),
            progressStart: document.getElementById("progressStart"),
            missionId: document.getElementById("missionId"),
            dateInput: document.getElementById("dateInput")
        };
        
        // localStorage işlemleri
        function save() {
            const state = {
                targetTime: targetTime,
                running: running,
                remaining: remaining
            };
            localStorage.setItem("countdown", JSON.stringify(state));
        }
        
        function load() {
            const saved = localStorage.getItem("countdown");
            if (!saved) return;
            try {
                const state = JSON.parse(saved);
                targetTime = state.targetTime;
                running = state.running;
                remaining = state.remaining;
                
                // Tarih input'una hedef zamanı yaz
                if (targetTime) {
                    el.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
                    el.target.textContent = "HEDEF: " + new Date(targetTime).toLocaleString("tr-TR", {
                        year: "numeric", month: "long", day: "numeric",
                        hour: "2-digit", minute: "2-digit", second: "2-digit"
                    });
                }
            } catch (e) {
                console.error("State yüklenemedi:", e);
            }
        }
        
        // Zaman formatla
        function format(diff) {
            if (diff <= 0) return null;
            const ms = diff % 1000;
            const s = Math.floor(diff / 1000);
            const sec = s % 60;
            const min = Math.floor(s / 60) % 60;
            const hour = Math.floor(s / 3600) % 24;
            const day = Math.floor(s / 86400);
            const month = Math.floor(day / 30);
            const year = Math.floor(month / 12);
            return { year, month: month % 12, day: day % 30, hour, min, sec, ms };
        }
        
        function updateDisplay(diff) {
            const f = format(diff);
            if (!f) {
                complete();
                return false;
            }
            el.yil.textContent = f.year;
            el.ay.textContent = f.month;
            el.gun.textContent = f.day;
            el.saat.textContent = f.hour;
            el.dk.textContent = f.min;
            el.sn.textContent = String(f.sec).padStart(2, "0");
            el.ms.textContent = String(f.ms).padStart(3, "0");
            el.big.textContent = String(f.sec).padStart(2, "0");
            
            if (targetTime) {
                const total = targetTime - (targetTime - diff);
                const startTime = targetTime - diff;
                const progress = ((Date.now() - startTime) / (targetTime - startTime)) * 100;
                el.progressFill.style.width = Math.min(progress, 100) + "%";
                el.progressPercent.textContent = "%" + Math.floor(Math.min(progress, 100));
            }
            return true;
        }
        
        function complete() {
            running = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            el.big.textContent = "00";
            el.big.classList.add("complete");
            el.statusDot.className = "status-dot complete";
            el.statusText.textContent = "TAMAMLANDI";
            el.progressFill.style.width = "100%";
            el.progressPercent.textContent = "%100";
            save();
            showToast("🎯 MİSYON TAMAMLANDI!");
            document.body.style.backgroundColor = "rgba(255, 68, 68, 0.1)";
            setTimeout(() => { document.body.style.backgroundColor = ""; }, 1000);
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
        
        function tick() {
            if (!running || !targetTime) return;
            const diff = targetTime - Date.now();
            if (!updateDisplay(diff)) return;
            animFrame = requestAnimationFrame(tick);
        }
        
        // Tarih seçildiğinde
        el.dateInput.addEventListener("change", function() {
            if (this.value) {
                targetTime = new Date(this.value).getTime();
                remaining = targetTime - Date.now();
                if (remaining > 0) {
                    updateDisplay(remaining);
                    el.target.textContent = "HEDEF: " + new Date(targetTime).toLocaleString("tr-TR", {
                        year: "numeric", month: "long", day: "numeric",
                        hour: "2-digit", minute: "2-digit", second: "2-digit"
                    });
                    save();
                    showToast("📅 Hedef ayarlandı: " + new Date(targetTime).toLocaleString("tr-TR", {
                        hour: "2-digit", minute: "2-digit"
                    }));
                }
            }
        });
        
        function start() {
            if (!targetTime && !el.dateInput.value) {
                showToast("⚠️ Lütfen tarih seçin!");
                return;
            }
            if (!targetTime) {
                targetTime = new Date(el.dateInput.value).getTime();
            }
            if (targetTime <= Date.now()) {
                showToast("⚠️ Geçmiş tarih!");
                return;
            }
            running = true;
            el.big.classList.remove("complete");
            el.statusDot.className = "status-dot active";
            el.statusText.textContent = "AKTİF";
            el.target.textContent = "HEDEF: " + new Date(targetTime).toLocaleString("tr-TR", {
                year: "numeric", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit", second: "2-digit"
            });
            el.progressStart.textContent = new Date().toLocaleTimeString("tr-TR", {
                hour: "2-digit", minute: "2-digit"
            });
            save();
            tick();
            showToast("▶ Geri sayım başladı!");
        }
        
        function stop() {
            if (!running) return;
            running = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            remaining = targetTime - Date.now();
            el.statusDot.className = "status-dot";
            el.statusText.textContent = "DURAKLATILDI";
            save();
            showToast("⏸ Duraklatıldı");
        }
        
        function resume() {
            if (running || !remaining || remaining <= 0) return;
            targetTime = Date.now() + remaining;
            running = true;
            el.statusDot.className = "status-dot active";
            el.statusText.textContent = "AKTİF";
            el.target.textContent = "HEDEF: " + new Date(targetTime).toLocaleString("tr-TR", {
                year: "numeric", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit", second: "2-digit"
            });
            el.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
            save();
            tick();
            showToast("⏵ Devam ediyor");
        }
        
        function addTime(minutes) {
            if (!targetTime && !remaining) {
                showToast("⚠️ Önce hedef belirleyin!");
                return;
            }
            const ct = targetTime || (Date.now() + remaining);
            targetTime = ct + (minutes * 60 * 1000);
            remaining = targetTime - Date.now();
            updateDisplay(remaining);
            el.target.textContent = "HEDEF: " + new Date(targetTime).toLocaleString("tr-TR", {
                year: "numeric", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit", second: "2-digit"
            });
            el.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
            save();
            showToast("➕ " + minutes + " dakika eklendi");
        }
        
        function reset() {
            running = false;
            targetTime = null;
            remaining = null;
            if (animFrame) cancelAnimationFrame(animFrame);
            el.yil.textContent = "0";
            el.ay.textContent = "0";
            el.gun.textContent = "0";
            el.saat.textContent = "0";
            el.dk.textContent = "0";
            el.sn.textContent = "00";
            el.ms.textContent = "000";
            el.big.textContent = "00";
            el.big.classList.remove("complete");
            el.target.textContent = "HEDEF: -";
            el.statusDot.className = "status-dot";
            el.statusText.textContent = "HAZIR";
            el.progressFill.style.width = "0%";
            el.progressPercent.textContent = "%0";
            el.progressStart.textContent = "BAŞLANGIÇ";
            el.dateInput.value = "";
            localStorage.removeItem("countdown");
            el.missionId.textContent = Math.random().toString(36).substring(2, 10).toUpperCase();
            showToast("🔄 Sıfırlandı");
        }
        
        function setPreset(minutes) {
            const td = new Date(Date.now() + minutes * 60 * 1000);
            el.dateInput.value = td.toISOString().slice(0, 16);
            targetTime = td.getTime();
            remaining = minutes * 60 * 1000;
            updateDisplay(remaining);
            el.target.textContent = "HEDEF: " + td.toLocaleString("tr-TR", {
                year: "numeric", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit", second: "2-digit"
            });
            save();
            showToast("⏱️ " + minutes + " dakikalık geri sayım hazır");
        }
        
        function showToast(msg) {
            const et = document.querySelector(".toast");
            if (et) et.remove();
            const t = document.createElement("div");
            t.className = "toast";
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
        }
        
        function createParticles() {
            const container = document.getElementById("particles");
            for (let i = 0; i < 30; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "%";
                p.style.width = Math.random() * 3 + 1 + "px";
                p.style.height = p.style.width;
                p.style.animationDuration = Math.random() * 10 + 5 + "s";
                p.style.animationDelay = Math.random() * 10 + "s";
                container.appendChild(p);
            }
        }
        
        // BAŞLAT
        createParticles();
        el.missionId.textContent = Math.random().toString(36).substring(2, 10).toUpperCase();
        
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        el.dateInput.min = now.toISOString().slice(0, 16);
        
        // KAYITLI STATE'I YÜKLE
        load();
        
        // Eğer kayıtlı state varsa ve çalışıyorsa devam et
        if (running && targetTime && targetTime > Date.now()) {
            tick();
        } else if (targetTime && targetTime > Date.now()) {
            // Durmuş ama hedef var - kalan süreyi göster
            remaining = targetTime - Date.now();
            updateDisplay(remaining);
        } else if (targetTime && targetTime <= Date.now()) {
            // Süre dolmuş
            complete();
        }
    </script>
</body>
</html>
