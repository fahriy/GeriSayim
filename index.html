<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Countdown Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e0d;
            --bg-secondary: #0d1210;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.3);
            --accent-glow: rgba(0, 255, 136, 0.1);
            --danger: #ff4444;
            --danger-dim: rgba(255, 68, 68, 0.3);
            --warning: #ffaa00;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border: rgba(0, 255, 136, 0.15);
            --glass: rgba(0, 0, 0, 0.6);
            --card-bg: rgba(10, 15, 13, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 136, 0.02) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            animation: float 6s infinite;
            opacity: 0;
            filter: blur(1px);
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        .main-container {
            width: 95%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 50px var(--accent-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .mission-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            box-shadow: none;
            transition: all 0.3s ease;
        }
        
        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }
        
        .status-dot.complete {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .timer-section {
            margin: 30px 0;
        }
        
        .main-timer {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .time-unit {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .time-unit:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .time-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
            line-height: 1.2;
            margin-bottom: 6px;
        }
        
        .time-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .center-display {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .big-seconds {
            font-family: 'Orbitron', sans-serif;
            font-size: 100px;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
            text-shadow: 
                0 0 30px var(--accent-glow),
                0 0 60px var(--accent-glow),
                0 0 90px var(--accent-dim);
            margin: 15px 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .big-seconds.complete {
            color: var(--danger);
            text-shadow: 
                0 0 30px var(--danger-dim),
                0 0 60px var(--danger-dim),
                0 0 90px rgba(255, 68, 68, 0.2);
            animation: none;
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-glow); }
            100% { text-shadow: 0 0 40px var(--accent-dim), 0 0 80px var(--accent-dim); }
        }
        
        .target-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        .target-info span {
            color: var(--accent);
        }
        
        .progress-section {
            margin: 25px 0;
        }
        
        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-dim);
            width: 0%;
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        
        .btn {
            padding: 12px 20px;
            height: 48px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            text-decoration: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .btn-accent {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-accent:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-primary:hover {
            background: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .btn-warning {
            border-color: var(--warning);
            color: var(--warning);
        }
        
        .btn-warning:hover {
            background: rgba(255, 170, 0, 0.15);
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.3);
            color: var(--warning);
            border-color: var(--warning);
        }
        
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.3);
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .preset-btn {
            padding: 8px 15px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        
        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .mission-id {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-secondary);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            z-index: 1000;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                padding: 20px;
                border-radius: 15px;
                margin: 10px 0;
            }
            
            .main-timer {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            
            .time-value {
                font-size: 24px;
            }
            
            .time-label {
                font-size: 9px;
            }
            
            .big-seconds {
                font-size: 70px;
            }
            
            .controls {
                flex-direction: column;
                gap: 8px;
            }
            
            .btn {
                width: 100%;
            }
            
            .presets {
                gap: 6px;
            }
            
            .preset-btn {
                font-size: 10px;
                padding: 6px 12px;
            }
        }
        
        @media (max-width: 480px) {
            .main-container {
                padding: 15px;
            }
            
            .main-timer {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            
            .time-value {
                font-size: 20px;
            }
            
            .big-seconds {
                font-size: 50px;
            }
            
            .mission-title {
                font-size: 11px;
                letter-spacing: 2px;
            }
            
            .btn {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
        
        @media (max-width: 350px) {
            .main-timer {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .time-value {
                font-size: 18px;
            }
            
            .big-seconds {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    
    <div class="main-wrapper">
        <div class="main-container">
            <div class="header">
                <div class="mission-title">◆ Operasyon Geri Sayım ◆</div>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <div class="status-text" id="statusText">HAZIR</div>
                </div>
            </div>
            
            <div class="timer-section">
                <div class="main-timer">
                    <div class="time-unit">
                        <div class="time-value" id="yil">0</div>
                        <div class="time-label">Yıl</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="ay">0</div>
                        <div class="time-label">Ay</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="gun">0</div>
                        <div class="time-label">Gün</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="saat">0</div>
                        <div class="time-label">Saat</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="dk">0</div>
                        <div class="time-label">Dakika</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="sn">00</div>
                        <div class="time-label">Saniye</div>
                    </div>
                    <div class="time-unit">
                        <div class="time-value" id="ms">000</div>
                        <div class="time-label">Milisaniye</div>
                    </div>
                </div>
                
                <div class="center-display">
                    <div class="big-seconds" id="bigSeconds">00</div>
                    <div class="target-info">
                        HEDEF: <span id="targetText">-</span>
                    </div>
                </div>
                
                <div class="progress-section">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-labels">
                        <span id="progressStart">BAŞLANGIÇ</span>
                        <span id="progressPercent">%0</span>
                        <span>HEDEF</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button type="button" class="btn btn-accent" id="dateButton">
                    📅 Hedef Tarih
                </button>
                <input type="datetime-local" id="dateInput" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
                
                <button type="button" class="btn btn-primary" id="startBtn">
                    ▶ Başlat
                </button>
                <button type="button" class="btn" id="stopBtn">
                    ⏸ Durdur
                </button>
                <button type="button" class="btn" id="resumeBtn">
                    ⏵ Devam
                </button>
                <button type="button" class="btn btn-warning" id="addTimeBtn">
                    +1 Dakika
                </button>
                <button type="button" class="btn btn-danger" id="resetBtn">
                    ⏹ Sıfırla
                </button>
            </div>
            
            <div class="presets">
                <button type="button" class="preset-btn" data-minutes="1">1 Dakika</button>
                <button type="button" class="preset-btn" data-minutes="5">5 Dakika</button>
                <button type="button" class="preset-btn" data-minutes="15">15 Dakika</button>
                <button type="button" class="preset-btn" data-minutes="30">30 Dakika</button>
                <button type="button" class="preset-btn" data-minutes="60">1 Saat</button>
                <button type="button" class="preset-btn" data-minutes="1440">24 Saat</button>
                <button type="button" class="preset-btn" data-minutes="10080">7 Gün</button>
            </div>
            
            <div class="footer">
                <div class="mission-id">MİSYON ID: #<span id="missionId">----</span></div>
            </div>
        </div>
    </div>
    
    <script>
        (function() {
            'use strict';
            
            // State
            let targetTime = null;
            let isRunning = false;
            let remainingTime = null;
            let animationFrameId = null;
            let initialDuration = null;
            
            // DOM Elements
            const els = {
                yil: document.getElementById('yil'),
                ay: document.getElementById('ay'),
                gun: document.getElementById('gun'),
                saat: document.getElementById('saat'),
                dk: document.getElementById('dk'),
                sn: document.getElementById('sn'),
                ms: document.getElementById('ms'),
                bigSeconds: document.getElementById('bigSeconds'),
                targetText: document.getElementById('targetText'),
                statusDot: document.getElementById('statusDot'),
                statusText: document.getElementById('statusText'),
                progressFill: document.getElementById('progressFill'),
                progressPercent: document.getElementById('progressPercent'),
                progressStart: document.getElementById('progressStart'),
                missionId: document.getElementById('missionId'),
                dateInput: document.getElementById('dateInput'),
                dateButton: document.getElementById('dateButton'),
                startBtn: document.getElementById('startBtn'),
                stopBtn: document.getElementById('stopBtn'),
                resumeBtn: document.getElementById('resumeBtn'),
                addTimeBtn: document.getElementById('addTimeBtn'),
                resetBtn: document.getElementById('resetBtn')
            };
            
            // Date picker - cross browser solution
            function openDatePicker() {
                // Create a temporary input for browsers that need it
                const tempInput = document.createElement('input');
                tempInput.type = 'datetime-local';
                tempInput.style.position = 'fixed';
                tempInput.style.top = '-100px';
                tempInput.style.left = '-100px';
                tempInput.style.opacity = '0';
                tempInput.style.pointerEvents = 'none';
                
                // Set min date
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                tempInput.min = now.toISOString().slice(0, 16);
                
                // If there's already a value, set it
                if (els.dateInput.value) {
                    tempInput.value = els.dateInput.value;
                }
                
                document.body.appendChild(tempInput);
                
                // Handle change
                tempInput.addEventListener('change', function() {
                    els.dateInput.value = this.value;
                    handleDateChange(this.value);
                    document.body.removeChild(this);
                });
                
                // Handle cancel (clicking away)
                tempInput.addEventListener('blur', function() {
                    setTimeout(() => {
                        if (!tempInput.value) {
                            document.body.removeChild(tempInput);
                        }
                    }, 300);
                });
                
                // Try showPicker first (Chrome), fallback to click
                try {
                    if (typeof tempInput.showPicker === 'function') {
                        tempInput.showPicker();
                    } else if (typeof tempInput.focus === 'function') {
                        tempInput.focus();
                        tempInput.click();
                    }
                } catch (e) {
                    tempInput.focus();
                    tempInput.click();
                }
            }
            
            function handleDateChange(value) {
                if (!value) return;
                
                targetTime = new Date(value).getTime();
                remainingTime = targetTime - Date.now();
                
                if (remainingTime > 0) {
                    updateDisplay(remainingTime);
                    els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    saveState();
                    showToast('📅 Hedef: ' + new Date(targetTime).toLocaleString('tr-TR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    }));
                } else {
                    showToast('⚠️ Geçmiş tarih seçilemez!');
                }
            }
            
            // Date button click
            els.dateButton.addEventListener('click', function(e) {
                e.preventDefault();
                openDatePicker();
            });
            
            // Also handle click on the hidden input directly (fallback)
            els.dateInput.addEventListener('click', function(e) {
                e.preventDefault();
                openDatePicker();
            });
            
            els.dateInput.addEventListener('change', function() {
                handleDateChange(this.value);
            });
            
            // Create particles
            function createParticles() {
                const container = document.getElementById('particles');
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.width = Math.random() * 3 + 1 + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.animationDuration = Math.random() * 10 + 5 + 's';
                    particle.style.animationDelay = Math.random() * 10 + 's';
                    fragment.appendChild(particle);
                }
                container.appendChild(fragment);
            }
            
            function generateMissionId() {
                els.missionId.textContent = Math.random().toString(36).substring(2, 10).toUpperCase();
            }
            
            function formatTime(diff) {
                if (diff <= 0) return null;
                
                const ms = diff % 1000;
                const totalSeconds = Math.floor(diff / 1000);
                const seconds = totalSeconds % 60;
                const totalMinutes = Math.floor(totalSeconds / 60);
                const minutes = totalMinutes % 60;
                const totalHours = Math.floor(totalMinutes / 60);
                const hours = totalHours % 24;
                const totalDays = Math.floor(totalHours / 24);
                const days = totalDays % 30;
                const totalMonths = Math.floor(totalDays / 30);
                const months = totalMonths % 12;
                const years = Math.floor(totalMonths / 12);
                
                return { years, months, days, hours, minutes, seconds, milliseconds: ms };
            }
            
            function updateDisplay(diff) {
                const time = formatTime(diff);
                if (!time) {
                    handleCompletion();
                    return;
                }
                
                els.yil.textContent = time.years;
                els.ay.textContent = time.months;
                els.gun.textContent = time.days;
                els.saat.textContent = time.hours;
                els.dk.textContent = time.minutes;
                els.sn.textContent = String(time.seconds).padStart(2, '0');
                els.ms.textContent = String(time.milliseconds).padStart(3, '0');
                els.bigSeconds.textContent = String(time.seconds).padStart(2, '0');
                
                if (initialDuration) {
                    const progress = ((initialDuration - diff) / initialDuration) * 100;
                    els.progressFill.style.width = Math.min(progress, 100) + '%';
                    els.progressPercent.textContent = '%' + Math.floor(Math.min(progress, 100));
                }
            }
            
            function handleCompletion() {
                isRunning = false;
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                
                els.bigSeconds.textContent = '00';
                els.bigSeconds.classList.add('complete');
                els.statusDot.className = 'status-dot complete';
                els.statusText.textContent = 'TAMAMLANDI';
                els.progressFill.style.width = '100%';
                els.progressPercent.textContent = '%100';
                
                showToast('🎯 MİSYON TAMAMLANDI!');
                
                document.body.style.transition = 'background-color 0.5s ease';
                document.body.style.backgroundColor = 'rgba(255, 68, 68, 0.1)';
                setTimeout(() => { document.body.style.backgroundColor = ''; }, 1000);
                
                if (navigator.vibrate) {
                    navigator.vibrate([200, 100, 200]);
                }
                
                saveState();
            }
            
            function tick() {
                if (!isRunning || !targetTime) return;
                
                const diff = targetTime - Date.now();
                if (diff <= 0) {
                    handleCompletion();
                    return;
                }
                
                updateDisplay(diff);
                animationFrameId = requestAnimationFrame(tick);
            }
            
            function startCountdown() {
                if (!targetTime) {
                    showToast('⚠️ Lütfen önce hedef tarih seçin!');
                    return;
                }
                
                if (targetTime <= Date.now()) {
                    showToast('⚠️ Geçmiş tarih seçilemez!');
                    return;
                }
                
                isRunning = true;
                initialDuration = targetTime - Date.now();
                
                els.bigSeconds.classList.remove('complete');
                els.statusDot.className = 'status-dot active';
                els.statusText.textContent = 'AKTİF';
                els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                els.progressStart.textContent = new Date().toLocaleTimeString('tr-TR', {
                    hour: '2-digit', minute: '2-digit'
                });
                
                saveState();
                tick();
                showToast('▶ Geri sayım başladı!');
            }
            
            function stopCountdown() {
                if (!isRunning) return;
                
                isRunning = false;
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                remainingTime = targetTime - Date.now();
                
                els.statusDot.className = 'status-dot';
                els.statusText.textContent = 'DURAKLATILDI';
                
                saveState();
                showToast('⏸ Duraklatıldı');
            }
            
            function resumeCountdown() {
                if (isRunning || !remainingTime || remainingTime <= 0) return;
                
                targetTime = Date.now() + remainingTime;
                isRunning = true;
                
                els.statusDot.className = 'status-dot active';
                els.statusText.textContent = 'AKTİF';
                els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                
                saveState();
                tick();
                showToast('⏵ Devam ediyor');
            }
            
            function addTime(minutes) {
                if (!targetTime && !remainingTime) {
                    showToast('⚠️ Önce hedef belirleyin!');
                    return;
                }
                
                const currentTarget = targetTime || (Date.now() + remainingTime);
                targetTime = currentTarget + (minutes * 60 * 1000);
                
                if (isRunning) {
                    initialDuration = targetTime - Date.now();
                }
                
                remainingTime = targetTime - Date.now();
                updateDisplay(remainingTime);
                els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                els.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
                
                saveState();
                showToast(`➕ ${minutes} dakika eklendi`);
            }
            
            function resetCountdown() {
                isRunning = false;
                targetTime = null;
                remainingTime = null;
                initialDuration = null;
                
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                
                els.yil.textContent = '0';
                els.ay.textContent = '0';
                els.gun.textContent = '0';
                els.saat.textContent = '0';
                els.dk.textContent = '0';
                els.sn.textContent = '00';
                els.ms.textContent = '000';
                els.bigSeconds.textContent = '00';
                els.bigSeconds.classList.remove('complete');
                els.targetText.textContent = '-';
                els.statusDot.className = 'status-dot';
                els.statusText.textContent = 'HAZIR';
                els.progressFill.style.width = '0%';
                els.progressPercent.textContent = '%0';
                els.progressStart.textContent = 'BAŞLANGIÇ';
                els.dateInput.value = '';
                
                localStorage.clear();
                generateMissionId();
                showToast('🔄 Sıfırlandı');
            }
            
            function setPreset(minutes) {
                const targetDate = new Date(Date.now() + minutes * 60 * 1000);
                const year = targetDate.getFullYear();
                const month = String(targetDate.getMonth() + 1).padStart(2, '0');
                const day = String(targetDate.getDate()).padStart(2, '0');
                const hours = String(targetDate.getHours()).padStart(2, '0');
                const mins = String(targetDate.getMinutes()).padStart(2, '0');
                
                els.dateInput.value = `${year}-${month}-${day}T${hours}:${mins}`;
                targetTime = targetDate.getTime();
                remainingTime = minutes * 60 * 1000;
                
                updateDisplay(remainingTime);
                els.targetText.textContent = targetDate.toLocaleString('tr-TR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                
                saveState();
                showToast(`⏱️ ${minutes} dakikalık geri sayım hazır`);
            }
            
            function showToast(message) {
                const existingToast = document.querySelector('.toast');
                if (existingToast) existingToast.remove();
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 3000);
            }
            
            function saveState() {
                try {
                    const state = { targetTime, isRunning, remainingTime, initialDuration };
                    localStorage.setItem('countdownState', JSON.stringify(state));
                } catch (e) {
                    // localStorage might be full or unavailable
                }
            }
            
            function loadState() {
                try {
                    const saved = localStorage.getItem('countdownState');
                    if (!saved) return;
                    
                    const state = JSON.parse(saved);
                    targetTime = state.targetTime;
                    isRunning = state.isRunning;
                    remainingTime = state.remainingTime;
                    initialDuration = state.initialDuration;
                    
                    if (targetTime) {
                        els.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
                        els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                            year: 'numeric', month: 'long', day: 'numeric',
                            hour: '2-digit', minute: '2-digit', second: '2-digit'
                        });
                        
                        if (targetTime <= Date.now()) {
                            handleCompletion();
                        } else if (remainingTime) {
                            updateDisplay(remainingTime);
                        }
                    }
                } catch (e) {
                    // Invalid state, ignore
                }
            }
            
            // Event Listeners
            els.startBtn.addEventListener('click', startCountdown);
            els.stopBtn.addEventListener('click', stopCountdown);
            els.resumeBtn.addEventListener('click', resumeCountdown);
            els.addTimeBtn.addEventListener('click', function() { addTime(1); });
            els.resetBtn.addEventListener('click', resetCountdown);
            
            // Preset buttons
            document.querySelectorAll('.preset-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const minutes = parseInt(this.getAttribute('data-minutes'));
                    if (minutes) setPreset(minutes);
                });
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && document.activeElement === document.body) {
                    e.preventDefault();
                    if (!isRunning && !remainingTime) {
                        startCountdown();
                    } else if (!isRunning && remainingTime) {
                        resumeCountdown();
                    }
                }
                if (e.key === ' ' && document.activeElement === document.body) {
                    e.preventDefault();
                    if (isRunning) {
                        stopCountdown();
                    }
                }
            });
            
            // Initialize
            function init() {
                createParticles();
                generateMissionId();
                loadState();
                
                if (isRunning && targetTime && targetTime > Date.now()) {
                    startCountdown();
                }
            }
            
            init();
        })();
    </script>
</body>
</html>
