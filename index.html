<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Countdown Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e0d;
            --bg-secondary: #0d1210;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.3);
            --accent-glow: rgba(0, 255, 136, 0.1);
            --danger: #ff4444;
            --danger-dim: rgba(255, 68, 68, 0.3);
            --warning: #ffaa00;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border: rgba(0, 255, 136, 0.15);
            --glass: rgba(0, 0, 0, 0.6);
            --card-bg: rgba(10, 15, 13, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 136, 0.02) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            animation: float 6s infinite;
            opacity: 0;
            filter: blur(1px);
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        .main-container {
            width: 95%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 50px var(--accent-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .mission-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s ease;
        }
        
        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }
        
        .status-dot.complete {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .timer-section {
            margin: 30px 0;
        }
        
        .main-timer {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .time-unit {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .time-unit:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .time-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
            line-height: 1.2;
            margin-bottom: 6px;
        }
        
        .time-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .center-display {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .big-seconds {
            font-family: 'Orbitron', sans-serif;
            font-size: 100px;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
            text-shadow: 
                0 0 30px var(--accent-glow),
                0 0 60px var(--accent-glow),
                0 0 90px var(--accent-dim);
            margin: 15px 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .big-seconds.complete {
            color: var(--danger);
            text-shadow: 
                0 0 30px var(--danger-dim),
                0 0 60px var(--danger-dim),
                0 0 90px rgba(255, 68, 68, 0.2);
            animation: none;
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-glow); }
            100% { text-shadow: 0 0 40px var(--accent-dim), 0 0 80px var(--accent-dim); }
        }
        
        .target-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        .target-info span {
            color: var(--accent);
        }
        
        .progress-section {
            margin: 25px 0;
        }
        
        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-dim);
            width: 0%;
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        
        .btn {
            padding: 12px 20px;
            height: 48px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            text-decoration: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .date-input {
            padding: 12px 20px;
            height: 48px;
            border: 1px solid var(--accent);
            background: var(--card-bg);
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
            outline: none;
            min-width: 200px;
        }
        
        .date-input:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(70%) sepia(100%) saturate(500%) hue-rotate(90deg);
            cursor: pointer;
        }
        
        .date-input::-webkit-datetime-edit-fields-wrapper {
            color: var(--accent);
        }
        
        .date-input::-webkit-datetime-edit-text {
            color: var(--accent);
            padding: 0 5px;
        }
        
        .btn-accent {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-accent:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-primary:hover {
            background: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .btn-warning {
            border-color: var(--warning);
            color: var(--warning);
        }
        
        .btn-warning:hover {
            background: rgba(255, 170, 0, 0.15);
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.3);
            color: var(--warning);
            border-color: var(--warning);
        }
        
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.3);
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .preset-btn {
            padding: 8px 15px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        
        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .mission-id {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-secondary);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            z-index: 1000;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .main-container {
                padding: 20px;
                border-radius: 15px;
                margin: 10px 0;
            }
            
            .main-timer {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            
            .time-value {
                font-size: 24px;
            }
            
            .time-label {
                font-size: 9px;
            }
            
            .big-seconds {
                font-size: 70px;
            }
            
            .controls {
                flex-direction: column;
                gap: 8px;
            }
            
            .btn, .date-input {
                width: 100%;
            }
            
            .presets {
                gap: 6px;
            }
            
            .preset-btn {
                font-size: 10px;
                padding: 6px 12px;
            }
        }
        
        @media (max-width: 480px) {
            .main-container {
                padding: 15px;
            }
            
            .main-timer {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            
            .time-value {
                font-size: 20px;
            }
            
            .big-seconds {
                font-size: 50px;
            }
            
            .mission-title {
                font-size: 11px;
                letter-spacing: 2px;
            }
            
            .btn, .date-input {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
        
        @media (max-width: 350px) {
            .main-timer {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .time-value {
                font-size: 18px;
            }
            
            .big-seconds {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    
    <div class="main-wrapper">
        <div class="main-container">
            <div class="header">
                <div class="mission-title">◆ Operasyon Geri Sayım ◆</div>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <div class="status-text" id="statusText">HAZIR</div>
                </div>
            </div>
            
            <div class="timer-section">
                <div class="main-timer">
                    <div class="time-unit"><div class="time-value" id="yil">0</div><div class="time-label">Yıl</div></div>
                    <div class="time-unit"><div class="time-value" id="ay">0</div><div class="time-label">Ay</div></div>
                    <div class="time-unit"><div class="time-value" id="gun">0</div><div class="time-label">Gün</div></div>
                    <div class="time-unit"><div class="time-value" id="saat">0</div><div class="time-label">Saat</div></div>
                    <div class="time-unit"><div class="time-value" id="dk">0</div><div class="time-label">Dakika</div></div>
                    <div class="time-unit"><div class="time-value" id="sn">00</div><div class="time-label">Saniye</div></div>
                    <div class="time-unit"><div class="time-value" id="ms">000</div><div class="time-label">Milisaniye</div></div>
                </div>
                
                <div class="center-display">
                    <div class="big-seconds" id="bigSeconds">00</div>
                    <div class="target-info">HEDEF: <span id="targetText">-</span></div>
                </div>
                
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="progress-labels">
                        <span id="progressStart">BAŞLANGIÇ</span>
                        <span id="progressPercent">%0</span>
                        <span>HEDEF</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <input type="datetime-local" id="dateInput" class="date-input">
                <button type="button" class="btn btn-primary" onclick="startCountdown()">▶ Başlat</button>
                <button type="button" class="btn" onclick="stopCountdown()">⏸ Durdur</button>
                <button type="button" class="btn" onclick="resumeCountdown()">⏵ Devam</button>
                <button type="button" class="btn btn-warning" onclick="addTime(1)">+1 Dakika</button>
                <button type="button" class="btn btn-danger" onclick="resetCountdown()">⏹ Sıfırla</button>
            </div>
            
            <div class="presets">
                <button type="button" class="preset-btn" onclick="setPreset(1)">1 Dakika</button>
                <button type="button" class="preset-btn" onclick="setPreset(5)">5 Dakika</button>
                <button type="button" class="preset-btn" onclick="setPreset(15)">15 Dakika</button>
                <button type="button" class="preset-btn" onclick="setPreset(30)">30 Dakika</button>
                <button type="button" class="preset-btn" onclick="setPreset(60)">1 Saat</button>
                <button type="button" class="preset-btn" onclick="setPreset(1440)">24 Saat</button>
                <button type="button" class="preset-btn" onclick="setPreset(10080)">7 Gün</button>
            </div>
            
            <div class="footer">
                <div class="mission-id">MİSYON ID: #<span id="missionId">----</span></div>
            </div>
        </div>
    </div>
    
    <script>
        let targetTime = null;
        let isRunning = false;
        let remainingTime = null;
        let animationFrameId = null;
        let initialDuration = null;
        
        const els = {
            yil: document.getElementById('yil'),
            ay: document.getElementById('ay'),
            gun: document.getElementById('gun'),
            saat: document.getElementById('saat'),
            dk: document.getElementById('dk'),
            sn: document.getElementById('sn'),
            ms: document.getElementById('ms'),
            bigSeconds: document.getElementById('bigSeconds'),
            targetText: document.getElementById('targetText'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            progressFill: document.getElementById('progressFill'),
            progressPercent: document.getElementById('progressPercent'),
            progressStart: document.getElementById('progressStart'),
            missionId: document.getElementById('missionId'),
            dateInput: document.getElementById('dateInput')
        };
        
        // Date input change
        els.dateInput.addEventListener('change', function() {
            if (this.value) {
                targetTime = new Date(this.value).getTime();
                remainingTime = targetTime - Date.now();
                if (remainingTime > 0) {
                    updateDisplay(remainingTime);
                    els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                        year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    saveState();
                    showToast('📅 Hedef: ' + new Date(targetTime).toLocaleString('tr-TR', { hour: '2-digit', minute: '2-digit' }));
                } else {
                    showToast('⚠️ Geçmiş tarih seçilemez!');
                    this.value = '';
                }
            }
        });
        
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = Math.random() * 3 + 1 + 'px';
                p.style.height = p.style.width;
                p.style.animationDuration = Math.random() * 10 + 5 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        }
        
        function generateMissionId() {
            els.missionId.textContent = Math.random().toString(36).substring(2, 10).toUpperCase();
        }
        
        function formatTime(diff) {
            if (diff <= 0) return null;
            const ms = diff % 1000;
            const ts = Math.floor(diff / 1000);
            const sec = ts % 60;
            const tm = Math.floor(ts / 60);
            const min = tm % 60;
            const th = Math.floor(tm / 60);
            const hr = th % 24;
            const td = Math.floor(th / 24);
            const day = td % 30;
            const tmo = Math.floor(td / 30);
            const mon = tmo % 12;
            const yr = Math.floor(tmo / 12);
            return { years: yr, months: mon, days: day, hours: hr, minutes: min, seconds: sec, milliseconds: ms };
        }
        
        function updateDisplay(diff) {
            const t = formatTime(diff);
            if (!t) { handleCompletion(); return; }
            els.yil.textContent = t.years;
            els.ay.textContent = t.months;
            els.gun.textContent = t.days;
            els.saat.textContent = t.hours;
            els.dk.textContent = t.minutes;
            els.sn.textContent = String(t.seconds).padStart(2, '0');
            els.ms.textContent = String(t.milliseconds).padStart(3, '0');
            els.bigSeconds.textContent = String(t.seconds).padStart(2, '0');
            if (initialDuration) {
                const p = ((initialDuration - diff) / initialDuration) * 100;
                els.progressFill.style.width = Math.min(p, 100) + '%';
                els.progressPercent.textContent = '%' + Math.floor(Math.min(p, 100));
            }
        }
        
        function handleCompletion() {
            isRunning = false;
            cancelAnimationFrame(animationFrameId);
            ['yil','ay','gun','saat','dk'].forEach(id => els[id].textContent = '0');
            els.sn.textContent = '00';
            els.ms.textContent = '000';
            els.bigSeconds.textContent = '00';
            els.bigSeconds.classList.add('complete');
            els.statusDot.className = 'status-dot complete';
            els.statusText.textContent = 'TAMAMLANDI';
            els.progressFill.style.width = '100%';
            els.progressPercent.textContent = '%100';
            showToast('🎯 MİSYON TAMAMLANDI!');
            document.body.style.backgroundColor = 'rgba(255, 68, 68, 0.1)';
            setTimeout(() => { document.body.style.backgroundColor = ''; }, 1000);
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            saveState();
        }
        
        function tick() {
            if (!isRunning || !targetTime) return;
            const diff = targetTime - Date.now();
            if (diff <= 0) { handleCompletion(); return; }
            updateDisplay(diff);
            animationFrameId = requestAnimationFrame(tick);
        }
        
        function startCountdown() {
            if (!targetTime) {
                const v = els.dateInput.value;
                if (!v) { showToast('⚠️ Lütfen tarih seçin!'); return; }
                targetTime = new Date(v).getTime();
            }
            if (targetTime <= Date.now()) { showToast('⚠️ Geçmiş tarih!'); return; }
            isRunning = true;
            initialDuration = targetTime - Date.now();
            els.bigSeconds.classList.remove('complete');
            els.statusDot.className = 'status-dot active';
            els.statusText.textContent = 'AKTİF';
            els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            els.progressStart.textContent = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            saveState();
            tick();
            showToast('▶ Geri sayım başladı!');
        }
        
        function stopCountdown() {
            if (!isRunning) return;
            isRunning = false;
            cancelAnimationFrame(animationFrameId);
            remainingTime = targetTime - Date.now();
            els.statusDot.className = 'status-dot';
            els.statusText.textContent = 'DURAKLATILDI';
            saveState();
            showToast('⏸ Duraklatıldı');
        }
        
        function resumeCountdown() {
            if (isRunning || !remainingTime || remainingTime <= 0) return;
            targetTime = Date.now() + remainingTime;
            isRunning = true;
            els.statusDot.className = 'status-dot active';
            els.statusText.textContent = 'AKTİF';
            els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            saveState();
            tick();
            showToast('⏵ Devam ediyor');
        }
        
        function addTime(minutes) {
            if (!targetTime && !remainingTime) { showToast('⚠️ Önce hedef belirleyin!'); return; }
            const ct = targetTime || (Date.now() + remainingTime);
            targetTime = ct + (minutes * 60 * 1000);
            if (isRunning) initialDuration = targetTime - Date.now();
            remainingTime = targetTime - Date.now();
            updateDisplay(remainingTime);
            els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            els.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
            saveState();
            showToast('➕ ' + minutes + ' dakika eklendi');
        }
        
        function resetCountdown() {
            isRunning = false;
            targetTime = null;
            remainingTime = null;
            initialDuration = null;
            cancelAnimationFrame(animationFrameId);
            ['yil','ay','gun','saat','dk'].forEach(id => els[id].textContent = '0');
            els.sn.textContent = '00';
            els.ms.textContent = '000';
            els.bigSeconds.textContent = '00';
            els.bigSeconds.classList.remove('complete');
            els.targetText.textContent = '-';
            els.statusDot.className = 'status-dot';
            els.statusText.textContent = 'HAZIR';
            els.progressFill.style.width = '0%';
            els.progressPercent.textContent = '%0';
            els.progressStart.textContent = 'BAŞLANGIÇ';
            els.dateInput.value = '';
            localStorage.clear();
            generateMissionId();
            showToast('🔄 Sıfırlandı');
        }
        
        function setPreset(minutes) {
            const td = new Date(Date.now() + minutes * 60 * 1000);
            const y = td.getFullYear();
            const m = String(td.getMonth() + 1).padStart(2, '0');
            const d = String(td.getDate()).padStart(2, '0');
            const h = String(td.getHours()).padStart(2, '0');
            const mi = String(td.getMinutes()).padStart(2, '0');
            els.dateInput.value = y + '-' + m + '-' + d + 'T' + h + ':' + mi;
            targetTime = td.getTime();
            remainingTime = minutes * 60 * 1000;
            updateDisplay(remainingTime);
            els.targetText.textContent = td.toLocaleString('tr-TR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            saveState();
            showToast('⏱️ ' + minutes + ' dakikalık geri sayım hazır');
        }
        
        function showToast(msg) {
            const et = document.querySelector('.toast');
            if (et) et.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
        }
        
        function saveState() {
            try {
                localStorage.setItem('countdownState', JSON.stringify({ targetTime, isRunning, remainingTime, initialDuration }));
            } catch (e) {}
        }
        
        function loadState() {
            try {
                const s = localStorage.getItem('countdownState');
                if (!s) return;
                const st = JSON.parse(s);
                targetTime = st.targetTime;
                isRunning = st.isRunning;
                remainingTime = st.remainingTime;
                initialDuration = st.initialDuration;
                if (targetTime) {
                    els.dateInput.value = new Date(targetTime).toISOString().slice(0, 16);
                    els.targetText.textContent = new Date(targetTime).toLocaleString('tr-TR', {
                        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    if (targetTime <= Date.now()) handleCompletion();
                    else if (remainingTime) updateDisplay(remainingTime);
                }
            } catch (e) {}
        }
        
        // Init
        createParticles();
        generateMissionId();
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        els.dateInput.min = now.toISOString().slice(0, 16);
        loadState();
        if (isRunning && targetTime && targetTime > Date.now()) startCountdown();
    </script>
</body>
</html>
