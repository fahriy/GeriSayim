<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tactical Countdown</title>

<style>
:root{
  --bg:#0a0e0d;
  --green:#00ff88;
  --dim:rgba(0,255,136,.2);
  --card:rgba(0,0,0,.45);
  --danger:#ff4444;
}

*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  background:radial-gradient(circle,#0a0e0d,#050607);
  color:var(--green);
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(to right,rgba(0,255,136,.05)1px,transparent1px),
    linear-gradient(to bottom,rgba(0,255,136,.05)1px,transparent1px);
  background-size:50px 50px;
  pointer-events:none;
}

.container{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

.hud{
  border:1px solid var(--dim);
  background:rgba(0,0,0,.4);
  padding:20px;
  border-radius:10px;
}

/* ROW */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  flex:1;
  min-width:110px;
  text-align:center;
  padding:10px;
  border:1px solid var(--dim);
  background:var(--card);
}

.value{
  font-size:26px;
  font-weight:700;
}

.label{
  font-size:11px;
  opacity:.7;
  letter-spacing:2px;
}

/* CENTER */
.center{
  text-align:center;
  margin:20px 0;
}

.big{
  font-size:70px;
  font-weight:800;
}

.ms{
  font-size:28px;
  opacity:.8;
}

/* INPUT */
input{
  padding:10px;
  width:260px;
  background:#0b120e;
  border:1px solid var(--dim);
  color:var(--green);
  text-align:center;
}

/* BUTTONS */
.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

button{
  padding:10px 15px;
  background:transparent;
  border:1px solid var(--green);
  color:var(--green);
  cursor:pointer;
}

button:hover{
  background:rgba(0,255,136,.1);
}

.danger{
  border-color:var(--danger);
  color:var(--danger);
}
</style>
</head>

<body>

<div class="container">
<div class="hud">

<!-- TIMER -->
<div class="row">
  <div class="box"><div class="value" id="yil">0</div><div class="label">YIL</div></div>
  <div class="box"><div class="value" id="ay">0</div><div class="label">AY</div></div>
  <div class="box"><div class="value" id="gun">0</div><div class="label">GÜN</div></div>
  <div class="box"><div class="value" id="saat">0</div><div class="label">SAAT</div></div>
  <div class="box"><div class="value" id="dk">0</div><div class="label">DK</div></div>
  <div class="box"><div class="value" id="sn">00</div><div class="label">SN</div></div>
  <div class="box"><div class="value" id="ms">000</div><div class="label">MS</div></div>
</div>

<!-- CENTER -->
<div class="center">
  <div class="big" id="big">00</div>
  <div id="targetText">HEDEF: -</div>
</div>

<!-- INPUT -->
<div class="center">
  <input type="datetime-local" id="inputDate">
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="start()">START</button>
  <button onclick="stop()">STOP</button>
  <button onclick="resume()">RESUME</button>
  <button class="danger" onclick="reset()">RESET</button>
</div>

</div>
</div>

<script>
let target=null;
let running=false;
let remaining=null;
let raf=null;

const el={
  yil:document.getElementById("yil"),
  ay:document.getElementById("ay"),
  gun:document.getElementById("gun"),
  saat:document.getElementById("saat"),
  dk:document.getElementById("dk"),
  sn:document.getElementById("sn"),
  ms:document.getElementById("ms"),
  big:document.getElementById("big"),
  target:document.getElementById("targetText"),
  input:document.getElementById("inputDate")
};

function format(diff){
  if(diff<=0) return null;

  const ms=diff%1000;
  const s=Math.floor(diff/1000);

  const sec=s%60;
  const min=Math.floor(s/60)%60;
  const hour=Math.floor(s/3600)%24;
  const day=Math.floor(s/86400);
  const month=Math.floor(day/30);
  const year=Math.floor(month/12);

  return {year,month:month%12,day:day%30,hour,min,sec,ms};
}

function tick(){
  if(!running) return;

  const diff=target-Date.now();
  const f=format(diff);

  if(!f){
    el.big.textContent="DONE";
    running=false;
    return;
  }

  el.yil.textContent=f.year;
  el.ay.textContent=f.month;
  el.gun.textContent=f.day;
  el.saat.textContent=f.hour;
  el.dk.textContent=f.min;
  el.sn.textContent=String(f.sec).padStart(2,"0");
  el.ms.textContent=String(f.ms).padStart(3,"0");
  el.big.textContent=String(f.sec).padStart(2,"0");

  raf=requestAnimationFrame(tick);
}

function start(){
  const val=el.input.value;
  if(!val) return;

  target=new Date(val).getTime();
  running=true;
  tick();

  el.target.textContent="HEDEF: "+new Date(target).toLocaleString();
}

function stop(){
  if(!running) return;
  running=false;
  cancelAnimationFrame(raf);
  remaining=target-Date.now();
}

function resume(){
  if(!remaining) return;
  target=Date.now()+remaining;
  running=true;
  tick();
}

function reset(){
  running=false;
  target=null;
  remaining=null;
  el.input.value="";

  el.yil.textContent="0";
  el.ay.textContent="0";
  el.gun.textContent="0";
  el.saat.textContent="0";
  el.dk.textContent="0";
  el.sn.textContent="00";
  el.ms.textContent="000";
  el.big.textContent="00";
  el.target.textContent="HEDEF: -";
}
</script>

</body>
</html>
