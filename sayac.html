<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tactical Countdown</title>

<style>
:root{
  --bg:#050607;
  --green:#39ff88;
  --dim:#1a2a20;
  --warn:#ff3b3b;
}

*{
  box-sizing:border-box;
  font-family:system-ui,Arial;
}

body{
  margin:0;
  background:radial-gradient(circle at center,#0a0f0c,#050607);
  color:var(--green);
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(to right, rgba(57,255,136,.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(57,255,136,.05) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* SCAN EFFECT */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,transparent,rgba(57,255,136,.06),transparent);
  animation:scan 4s linear infinite;
  pointer-events:none;
}

@keyframes scan{
  0%{transform:translateY(-100%)}
  100%{transform:translateY(100%)}
}

.container{
  max-width:1200px;
  margin:60px auto;
  padding:20px;
}

/* HUD PANEL */
.hud{
  border:1px solid rgba(57,255,136,.3);
  background:rgba(0,0,0,.4);
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(57,255,136,.1);
}

/* MAIN ROW */
.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

/* BOXES */
.box{
  flex:1;
  min-width:110px;
  text-align:center;
  padding:12px 8px;
  border:1px solid rgba(57,255,136,.25);
  background:rgba(0,0,0,.25);
  border-radius:8px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* VALUE */
.value{
  font-size:28px;
  font-weight:700;
  letter-spacing:1px;
}

/* LABEL */
.label{
  font-size:12px;
  opacity:.7;
  letter-spacing:2px;
  text-transform:uppercase;
}

/* CENTER DISPLAY */
.center{
  text-align:center;
  margin:25px 0;
}

.sec{
  font-size:70px;
  font-weight:800;
  text-shadow:0 0 15px rgba(57,255,136,.4);
}

.ms{
  font-size:28px;
  opacity:.8;
}

/* CONTROLS */
.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

input{
  padding:10px;
  background:#0b120e;
  border:1px solid rgba(57,255,136,.3);
  color:var(--green);
}

button{
  padding:10px 15px;
  background:transparent;
  border:1px solid var(--green);
  color:var(--green);
  cursor:pointer;
}

button:hover{
  background:rgba(57,255,136,.1);
}

.danger{
  border-color:var(--warn);
  color:var(--warn);
}

/* COMPLETE */
.complete{
  color:var(--warn);
}
</style>
</head>

<body>

<div class="container">
  <div class="hud">

    <!-- TOP ROW -->
    <div class="row">
      <div class="box"><div class="value" id="yil">0</div><div class="label">YIL</div></div>
      <div class="box"><div class="value" id="ay">0</div><div class="label">AY</div></div>
      <div class="box"><div class="value" id="gun">0</div><div class="label">GÜN</div></div>
      <div class="box"><div class="value" id="saat">0</div><div class="label">SAAT</div></div>
      <div class="box"><div class="value" id="dk">0</div><div class="label">DK</div></div>
      <div class="box"><div class="value" id="sn">00</div><div class="label">SN</div></div>
      <div class="box"><div class="value" id="ms">000</div><div class="label">MS</div></div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="sec" id="big">MISSION</div>
      <div class="ms" id="targetText">HEDEF: -</div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <input type="datetime-local" id="dateInput"/>
      <button onclick="start()">START</button>
      <button onclick="stop()">STOP</button>
      <button onclick="resume()">RESUME</button>
      <button class="danger" onclick="reset()">RESET</button>
    </div>

  </div>
</div>

<script>
let targetTime=null;
let running=false;
let remaining=null;

const el={
  yil:document.getElementById("yil"),
  ay:document.getElementById("ay"),
  gun:document.getElementById("gun"),
  saat:document.getElementById("saat"),
  dk:document.getElementById("dk"),
  sn:document.getElementById("sn"),
  ms:document.getElementById("ms"),
  big:document.getElementById("big"),
  target:document.getElementById("targetText")
};

function save(){
  localStorage.setItem("t",targetTime);
  localStorage.setItem("r",running);
  localStorage.setItem("rem",remaining);
}

function load(){
  targetTime=+localStorage.getItem("t");
  running=localStorage.getItem("r")==="true";
  remaining=+localStorage.getItem("rem");
}

function format(diff){
  if(diff<=0) return null;

  const ms=diff%1000;
  const s=Math.floor(diff/1000);

  const sec=s%60;
  const min=Math.floor(s/60)%60;
  const hour=Math.floor(s/3600)%24;
  const day=Math.floor(s/86400);
  const month=Math.floor(day/30);
  const year=Math.floor(month/12);

  return {year,month:month%12,day:day%30,hour,min,sec,ms};
}

function tick(){
  if(!running||!targetTime) return;

  const diff=targetTime-Date.now();
  const f=format(diff);

  if(!f){
    el.big.textContent="MISSION COMPLETE";
    document.body.classList.add("complete");
    running=false;
    save();
    return;
  }

  el.yil.textContent=f.year;
  el.ay.textContent=f.month;
  el.gun.textContent=f.day;
  el.saat.textContent=f.hour;
  el.dk.textContent=f.min;
  el.sn.textContent=String(f.sec).padStart(2,"0");
  el.ms.textContent=String(f.ms).padStart(3,"0");

  requestAnimationFrame(tick);
}

function start(){
  const v=document.getElementById("dateInput").value;
  if(!v) return;

  targetTime=new Date(v).getTime();
  running=true;

  el.target.textContent="HEDEF: "+new Date(targetTime).toLocaleString();

  save();
  tick();
}

function stop(){
  if(!running) return;
  running=false;
  remaining=targetTime-Date.now();
  save();
}

function resume(){
  if(!remaining) return;
  targetTime=Date.now()+remaining;
  running=true;
  save();
  tick();
}

function reset(){
  running=false;
  targetTime=null;
  remaining=null;
  localStorage.clear();

  location.reload();
}

load();
if(running&&targetTime) tick();
</script>

</body>
</html>
